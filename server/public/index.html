<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屏幕观看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    .toolbar { display: flex; gap: 8px; padding: 12px; align-items: center; background: #222; }
    .toolbar input { padding: 8px 12px; border: 1px solid #444; border-radius: 4px; background: #333; color: #eee; font-size: 14px; width: 120px; }
    .toolbar button { padding: 8px 16px; border: none; border-radius: 4px; background: #4a9; color: #fff; cursor: pointer; font-size: 14px; }
    .toolbar button:disabled { background: #555; cursor: not-allowed; }
    .toolbar button.connected { background: #c44; }
    .toolbar button.annotate { background: #f90; }
    .status { font-size: 13px; color: #888; margin-left: 8px; }
    .video-wrap { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
    video { max-width: 100%; max-height: 100%; background: #000; }
    .annotate-canvas { position: absolute; cursor: crosshair; display: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="roomId" type="text" placeholder="房间 ID" maxlength="6">
    <button id="connectBtn" onclick="toggleConnection()">连接</button>
    <button id="annotateBtn" onclick="toggleAnnotate()" style="display:none">标注</button>
    <span id="status" class="status">未连接</span>
  </div>
  <div class="video-wrap">
    <video id="video" autoplay playsinline></video>
    <canvas class="annotate-canvas" id="annotateCanvas"></canvas>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
